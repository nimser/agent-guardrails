id: secret-managers
name: Secret Manager Protection
description: Block secret retrieval from password managers — a fetched secret has no safe partial form

rules:
  - id: secret-managers.pass
    title: Block pass show
    description: Catches pass show and pass find output of stored secrets
    phase: before-tool
    match:
      type: bash-command
      pattern: "(^|[;&|]\\s*)pass\\s+(show\\b|\\S*/)"
    defaultAction:
      type: block
      message: 'Blocked: `{matched}` retrieves a stored secret — no safe partial exists.'

  - id: secret-managers.op
    title: Block 1Password CLI reads
    description: Catches op read and op item get
    phase: before-tool
    match:
      type: bash-command
      pattern: "(^|[;&|]\\s*)op\\s+(read|item\\s+get)\\b"
    defaultAction:
      type: block
      message: 'Blocked: `{matched}` retrieves a stored secret — no safe partial exists.'

  - id: secret-managers.gopass
    title: Block gopass show
    description: Catches gopass show
    phase: before-tool
    match:
      type: bash-command
      pattern: "(^|[;&|]\\s*)gopass\\s+(show|cat)\\b"
    defaultAction:
      type: block
      message: 'Blocked: `{matched}` retrieves a stored secret — no safe partial exists.'

  - id: secret-managers.bitwarden
    title: Block Bitwarden CLI secret retrieval
    description: Catches bw get password/item
    phase: before-tool
    match:
      type: bash-command
      pattern: "(^|[;&|]\\s*)bw\\s+get\\b"
    defaultAction:
      type: block
      message: 'Blocked: `{matched}` retrieves a stored secret — no safe partial exists.'
