    title: Rule 1
    description: First
    phase: before-tool
    match:
      type: bash-command
      pattern: test
    defaultAction:
      type: block
      message: 'Blocked'
  - id: dup-rule
    title: Rule 2
    description: Second
    phase: before-tool
    match:
      type: bash-command
      pattern: test2
    defaultAction:
      type: block
      message: 'Blocked'
